<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>SMS Spam Detector</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

</head>

<body>

<div class="container main-card">

<h1 class="title">SMS Spam Detector</h1>

<p class="subtitle">Check whether a message is Spam or Safe</p>

<form action="/" method="POST">

<textarea 
class="form-control message-box"
name="message"
placeholder="Type your SMS message here..."
required></textarea>

<button class="btn btn-primary check-btn">
Check Message
</button>

</form>

{% if prediction %}

<div class="result-box 
{% if prediction == 'Spam' %}spam{% else %}ham{% endif %}">

Prediction: {{ prediction }}

</div>

{% endif %}

</div>

</body>
</html>
